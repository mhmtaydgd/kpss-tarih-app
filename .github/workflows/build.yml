name: APK Derleyici (Kesin Çözüm)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Buildozer Ayarlarını Hazırla
        run: |
          rm -f buildozer.spec
          buildozer init
          sed -i 's/^title =.*/title = KPSS Tarih/' buildozer.spec
          sed -i 's/^package.name =.*/package.name = kpsstarih/' buildozer.spec
          sed -i 's/^package.domain =.*/package.domain = org.mehmet/' buildozer.spec
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec

      - name: Resmi Paket ile APK Derleme
        uses: hergertarian/buildozer-action@v1
        with:
          command: buildozer -v android debug

      - name: APK Dosyasını İndirilebilir Hale Getir
        uses: actions/upload-artifact@v4
        with:
          name: KpssTarih_Uygulamasi
          path: bin/*.apk
