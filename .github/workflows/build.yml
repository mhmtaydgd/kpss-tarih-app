name: APK Derleyici

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Python Ayarlari
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Java 11 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Gerekli Kutuphanelerin Kurulumu
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev lib32stdc++6 lib32z1
          pip install --upgrade buildozer cython==0.29.33 virtualenv

      - name: Buildozer Ayarlari ve Kesin Sabitleme
        run: |
          rm -f buildozer.spec
          buildozer init
          
          # Uygulama ve Paket İsimleri
          sed -i 's/^title =.*/title = KPSS Tarih/' buildozer.spec
          sed -i 's/^package.name =.*/package.name = kpsstarih/' buildozer.spec
          sed -i 's/^package.domain =.*/package.domain = org.mehmet/' buildozer.spec
          
          # Parametreleri Tam Yerinde Değiştirme (Hata Riskini Sıfırlayan Kısım)
          sed -i 's/^#\s*android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^#\s*android.ndk_version =.*/android.ndk_version = 25b/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^android.minapi =.*/android.minapi = 24/' buildozer.spec
          
      - name: APK Derlemeyi Baslat
        run: yes | buildozer -v android debug

      - name: APK Dosyasini İndirilebilir Hale Getir
        uses: actions/upload-artifact@v4
        with:
          name: KpssTarih_Uygulamasi
          path: bin/*.apk
